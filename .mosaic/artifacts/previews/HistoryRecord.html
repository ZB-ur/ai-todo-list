<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HistoryRecord Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 16px; background: #f8fafc; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>
  <div class="max-w-sm mx-auto space-y-2">

    <button class="w-full text-left px-4 py-3 bg-white border border-gray-200 rounded-xl hover:bg-blue-50 hover:border-blue-200 active:bg-blue-100 transition-colors duration-100 cursor-pointer select-none">
      <span class="text-sm text-gray-600">3 + 5 × 2</span>
      <span class="text-sm text-gray-400 mx-2">=</span>
      <span class="text-sm font-semibold text-gray-900">13</span>
    </button>

    <button class="w-full text-left px-4 py-3 bg-white border border-gray-200 rounded-xl hover:bg-blue-50 hover:border-blue-200 active:bg-blue-100 transition-colors duration-100 cursor-pointer select-none">
      <span class="text-sm text-gray-600">42 ÷ 6</span>
      <span class="text-sm text-gray-400 mx-2">=</span>
      <span class="text-sm font-semibold text-gray-900">7</span>
    </button>

    <button class="w-full text-left px-4 py-3 bg-white border border-gray-200 rounded-xl hover:bg-blue-50 hover:border-blue-200 active:bg-blue-100 transition-colors duration-100 cursor-pointer select-none">
      <span class="text-sm text-gray-600">100 − 37</span>
      <span class="text-sm text-gray-400 mx-2">=</span>
      <span class="text-sm font-semibold text-gray-900">63</span>
    </button>

  </div>
</body>
</html>
