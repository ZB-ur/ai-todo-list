<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 16px; background: #f8fafc; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>
  <div class="min-h-screen bg-slate-50 flex items-start justify-center p-4 sm:p-8">
    <div class="w-full max-w-md space-y-3">

      <!-- Display -->
      <div class="bg-white border border-gray-200 rounded-xl p-6 text-right">
        <div class="text-sm text-gray-600 truncate min-h-[1.25rem]">12 + 7 ×</div>
        <div class="text-3xl font-bold text-gray-900 truncate mt-1">3</div>
      </div>

      <!-- Button Panel -->
      <div class="grid grid-cols-4 gap-2">
        <!-- Row 1: actions -->
        <button class="bg-gray-100 text-gray-600 border border-gray-200 hover:bg-gray-200 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">AC</button>
        <button class="bg-gray-100 text-gray-600 border border-gray-200 hover:bg-gray-200 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">⌫</button>
        <button class="bg-gray-100 text-gray-600 border border-gray-200 hover:bg-gray-200 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">%</button>
        <button class="bg-blue-50 text-blue-600 border border-blue-200 hover:bg-blue-100 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">÷</button>

        <!-- Row 2 -->
        <button class="bg-white text-gray-900 border border-gray-200 hover:bg-gray-50 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">7</button>
        <button class="bg-white text-gray-900 border border-gray-200 hover:bg-gray-50 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">8</button>
        <button class="bg-white text-gray-900 border border-gray-200 hover:bg-gray-50 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">9</button>
        <button class="bg-blue-50 text-blue-600 border border-blue-200 hover:bg-blue-100 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">×</button>

        <!-- Row 3 -->
        <button class="bg-white text-gray-900 border border-gray-200 hover:bg-gray-50 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">4</button>
        <button class="bg-white text-gray-900 border border-gray-200 hover:bg-gray-50 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">5</button>
        <button class="bg-white text-gray-900 border border-gray-200 hover:bg-gray-50 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">6</button>
        <button class="bg-blue-50 text-blue-600 border border-blue-200 hover:bg-blue-100 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">−</button>

        <!-- Row 4 -->
        <button class="bg-white text-gray-900 border border-gray-200 hover:bg-gray-50 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">1</button>
        <button class="bg-white text-gray-900 border border-gray-200 hover:bg-gray-50 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">2</button>
        <button class="bg-white text-gray-900 border border-gray-200 hover:bg-gray-50 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">3</button>
        <button class="bg-blue-50 text-blue-600 border border-blue-200 hover:bg-blue-100 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">+</button>

        <!-- Row 5 -->
        <button class="bg-gray-100 text-gray-600 border border-gray-200 hover:bg-gray-200 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">±</button>
        <button class="bg-white text-gray-900 border border-gray-200 hover:bg-gray-50 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">0</button>
        <button class="bg-white text-gray-900 border border-gray-200 hover:bg-gray-50 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">.</button>
        <button class="bg-blue-600 text-white border border-blue-600 hover:bg-blue-700 rounded-xl text-lg font-semibold h-14 flex items-center justify-center">=</button>
      </div>

      <!-- History Toggle -->
      <button class="w-full flex items-center justify-center gap-2 py-2 text-sm text-gray-600 hover:text-gray-900 transition-colors">
        <span>History</span>
        <span class="bg-gray-100 text-gray-600 text-xs font-medium px-2 py-0.5 rounded-full">3</span>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </button>

      <!-- History Panel (shown) -->
      <div class="bg-white border border-gray-200 rounded-xl divide-y divide-gray-100">
        <button class="w-full px-4 py-3 text-left hover:bg-gray-50 transition-colors">
          <div class="text-sm text-gray-600 truncate">45 + 30</div>
          <div class="flex items-center justify-between mt-0.5">
            <span class="text-base font-semibold text-gray-900">= 75</span>
            <span class="text-xs text-gray-400">2 min ago</span>
          </div>
        </button>
        <button class="w-full px-4 py-3 text-left hover:bg-gray-50 transition-colors">
          <div class="text-sm text-gray-600 truncate">100 ÷ 4</div>
          <div class="flex items-center justify-between mt-0.5">
            <span class="text-base font-semibold text-gray-900">= 25</span>
            <span class="text-xs text-gray-400">5 min ago</span>
          </div>
        </button>
        <button class="w-full px-4 py-3 text-left hover:bg-gray-50 transition-colors">
          <div class="text-sm text-gray-600 truncate">3 + 5 × 2</div>
          <div class="flex items-center justify-between mt-0.5">
            <span class="text-base font-semibold text-gray-900">= 13</span>
            <span class="text-xs text-gray-400">10 min ago</span>
          </div>
        </button>
      </div>

    </div>
  </div>
</body>
</html>
