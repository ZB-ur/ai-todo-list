<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 16px; background: #030712; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>
  <div class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm bg-gray-900 rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 space-y-4">

      <!-- Display -->
      <div class="w-full bg-gray-900 rounded-lg p-6 border border-red-900 shadow-lg shadow-red-900/50">
        <div class="text-5xl font-mono font-bold text-orange-100 text-right tracking-wider truncate" style="min-height: 3.5rem; line-height: 3.5rem;">
          42
        </div>
      </div>

      <!-- Button Grid -->
      <div class="grid grid-cols-4 gap-3">
        <!-- Row 1: AC, ⌫, %, ÷ -->
        <button class="bg-gray-700 hover:bg-red-800 active:bg-red-700 text-orange-100 text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">AC</button>
        <button class="bg-gray-700 hover:bg-red-800 active:bg-red-700 text-orange-100 text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">⌫</button>
        <button class="bg-gray-700 hover:bg-red-800 active:bg-red-700 text-orange-100 text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">%</button>
        <button class="bg-red-700 text-orange-100 hover:bg-red-800 active:bg-red-700 text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">÷</button>

        <!-- Row 2: 7, 8, 9, × -->
        <button class="bg-gray-800 hover:bg-red-800 active:bg-red-700 text-orange-100 text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">7</button>
        <button class="bg-gray-800 hover:bg-red-800 active:bg-red-700 text-orange-100 text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">8</button>
        <button class="bg-gray-800 hover:bg-red-800 active:bg-red-700 text-orange-100 text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">9</button>
        <button class="bg-red-500 text-white hover:bg-red-800 active:bg-red-700 text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">×</button>

        <!-- Row 3: 4, 5, 6, − -->
        <button class="bg-gray-800 hover:bg-red-800 active:bg-red-700 text-orange-100 text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">4</button>
        <button class="bg-gray-800 hover:bg-red-800 active:bg-red-700 text-orange-100 text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">5</button>
        <button class="bg-gray-800 hover:bg-red-800 active:bg-red-700 text-orange-100 text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">6</button>
        <button class="bg-red-700 text-orange-100 hover:bg-red-800 active:bg-red-700 text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">−</button>

        <!-- Row 4: 1, 2, 3, + -->
        <button class="bg-gray-800 hover:bg-red-800 active:bg-red-700 text-orange-100 text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">1</button>
        <button class="bg-gray-800 hover:bg-red-800 active:bg-red-700 text-orange-100 text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">2</button>
        <button class="bg-gray-800 hover:bg-red-800 active:bg-red-700 text-orange-100 text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">3</button>
        <button class="bg-red-700 text-orange-100 hover:bg-red-800 active:bg-red-700 text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">+</button>

        <!-- Row 5: 0 (wide), ., = -->
        <button class="col-span-2 bg-gray-800 hover:bg-red-800 active:bg-red-700 text-orange-100 text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">0</button>
        <button class="bg-gray-800 hover:bg-red-800 active:bg-red-700 text-orange-100 text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">.</button>
        <button class="bg-orange-600 hover:bg-orange-500 active:bg-orange-500 text-white text-2xl font-mono font-bold rounded-lg p-4 border border-red-900 shadow-lg shadow-red-900/50 transition-colors duration-150 select-none">=</button>
      </div>

    </div>
  </div>
</body>
</html>
