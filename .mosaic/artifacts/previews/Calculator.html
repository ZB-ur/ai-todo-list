<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 16px; background: #f8fafc; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>
  <div class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
    <div class="w-full max-w-sm bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-4">
      <!-- Display -->
      <div class="w-full bg-gray-900 rounded-xl p-6 min-h-[96px] flex items-end justify-end overflow-hidden">
        <span class="text-5xl font-light text-white tracking-wide truncate max-w-full text-right">
          42
        </span>
      </div>

      <!-- Button Grid -->
      <div class="grid grid-cols-4 gap-3">
        <!-- Row 1: AC, ⌫, ÷ -->
        <button class="bg-gray-200 border border-gray-200 rounded-xl text-gray-900 text-xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-gray-300">AC</button>
        <button class="bg-gray-200 border border-gray-200 rounded-xl text-gray-900 text-xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-gray-300">⌫</button>
        <div></div>
        <button class="bg-blue-600 border border-blue-600 rounded-xl text-white text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-blue-700">÷</button>

        <!-- Row 2: 7, 8, 9, × -->
        <button class="bg-white border border-gray-200 rounded-xl text-gray-900 text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-gray-50">7</button>
        <button class="bg-white border border-gray-200 rounded-xl text-gray-900 text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-gray-50">8</button>
        <button class="bg-white border border-gray-200 rounded-xl text-gray-900 text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-gray-50">9</button>
        <button class="bg-blue-600 border border-blue-600 rounded-xl text-white text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-blue-700">×</button>

        <!-- Row 3: 4, 5, 6, − -->
        <button class="bg-white border border-gray-200 rounded-xl text-gray-900 text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-gray-50">4</button>
        <button class="bg-white border border-gray-200 rounded-xl text-gray-900 text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-gray-50">5</button>
        <button class="bg-white border border-gray-200 rounded-xl text-gray-900 text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-gray-50">6</button>
        <button class="bg-blue-600 border border-blue-600 rounded-xl text-white text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-blue-700">−</button>

        <!-- Row 4: 1, 2, 3, + -->
        <button class="bg-white border border-gray-200 rounded-xl text-gray-900 text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-gray-50">1</button>
        <button class="bg-white border border-gray-200 rounded-xl text-gray-900 text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-gray-50">2</button>
        <button class="bg-white border border-gray-200 rounded-xl text-gray-900 text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-gray-50">3</button>
        <button class="bg-blue-600 border border-blue-600 rounded-xl text-white text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-blue-700">+</button>

        <!-- Row 5: 0 (wide), ., = -->
        <button class="col-span-2 bg-white border border-gray-200 rounded-xl text-gray-900 text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-gray-50">0</button>
        <button class="bg-white border border-gray-200 rounded-xl text-gray-900 text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-gray-50">.</button>
        <button class="bg-blue-600 border border-blue-600 rounded-xl text-white text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-blue-700">=</button>
      </div>
    </div>
  </div>
</body>
</html>
