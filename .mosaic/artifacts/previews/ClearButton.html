<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClearButton Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { margin: 0; padding: 16px; background: #f8fafc; font-family: system-ui, sans-serif; }</style>
</head>
<body>
  <div style="max-width: 320px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px;">
    <!-- Default state -->
    <button class="bg-gray-200 border border-gray-200 rounded-xl text-gray-900 text-xl font-medium h-16 flex items-center justify-center cursor-pointer hover:bg-gray-300" style="width: 100%;">
      AC
    </button>

    <!-- In context: simulated calculator top row -->
    <div class="grid grid-cols-4 gap-3">
      <button class="bg-gray-200 border border-gray-200 rounded-xl text-gray-900 text-xl font-medium h-16 flex items-center justify-center cursor-pointer">
        AC
      </button>
      <button class="bg-gray-200 border border-gray-200 rounded-xl text-gray-900 text-xl font-medium h-16 flex items-center justify-center cursor-pointer">
        +/−
      </button>
      <button class="bg-gray-200 border border-gray-200 rounded-xl text-gray-900 text-xl font-medium h-16 flex items-center justify-center cursor-pointer">
        %
      </button>
      <button class="bg-blue-600 border border-blue-600 rounded-xl text-white text-2xl font-medium h-16 flex items-center justify-center cursor-pointer">
        ÷
      </button>
    </div>
  </div>
</body>
</html>
