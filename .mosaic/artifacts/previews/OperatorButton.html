<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OperatorButton Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 16px; background: #f8fafc; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>
  <div style="max-width: 320px; margin: 0 auto;">
    <p class="text-sm text-gray-500 mb-3">Default state</p>
    <div class="grid grid-cols-4 gap-3 mb-8">
      <button class="bg-blue-50 text-blue-600 border border-gray-200 rounded-xl text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-blue-100 transition-all duration-100">+</button>
      <button class="bg-blue-50 text-blue-600 border border-gray-200 rounded-xl text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-blue-100 transition-all duration-100">−</button>
      <button class="bg-blue-50 text-blue-600 border border-gray-200 rounded-xl text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-blue-100 transition-all duration-100">×</button>
      <button class="bg-blue-50 text-blue-600 border border-gray-200 rounded-xl text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer hover:bg-blue-100 transition-all duration-100">÷</button>
    </div>

    <p class="text-sm text-gray-500 mb-3">Active state (× selected)</p>
    <div class="grid grid-cols-4 gap-3">
      <button class="bg-blue-50 text-blue-600 border border-gray-200 rounded-xl text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer">+</button>
      <button class="bg-blue-50 text-blue-600 border border-gray-200 rounded-xl text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer">−</button>
      <button class="bg-blue-600 text-white border border-blue-600 rounded-xl text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer">×</button>
      <button class="bg-blue-50 text-blue-600 border border-gray-200 rounded-xl text-2xl font-medium h-16 flex items-center justify-center select-none cursor-pointer">÷</button>
    </div>
  </div>
</body>
</html>
